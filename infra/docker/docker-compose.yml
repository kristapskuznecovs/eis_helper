services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
